app:
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  show_version_update: true # 控制显示版本更新提示，如果 false，则不接受新版本提示

crawler:
  request_interval: 1000 # 请求间隔(毫秒)
  enable_crawler: true # 是否启用爬取新闻功能，如果 false，则直接停止程序
  use_proxy: false # 是否启用代理，false 时为关闭
  default_proxy: "http://127.0.0.1:10086"

# 去重设置
deduplication:
  enabled: true # 启用去重，基于标题和URL
  window: "24h" # 去重时间窗口，24小时内重复内容不推送

# 时区设置
timezone: "Asia/Shanghai" # 确保定时任务按北京时间运行

notification:
  enable_notification: true # 启用通知功能
  message_batch_size: 4000 # 消息分批大小（字节）
  dingtalk_batch_size: 20000 # 钉钉消息分批大小（字节）
  batch_send_interval: 1 # 批次发送间隔（秒）
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━" # feishu 消息分割线

  silent_push:
    enabled: false # 禁用静默推送，使用任务定时推送
    time_range:
      start: "20:00"
      end: "22:00"
    once_per_day: true
    push_record_retention_days: 7

  webhooks:
    feishu_url: "${{ secrets.FEISHU_WEBHOOK_URL }}" # 从 GitHub Secrets 获取
    dingtalk_url: "" # 钉钉机器人的 webhook URL
    wework_url: "" # 企业微信机器人的 webhook URL
    telegram_bot_token: "" # Telegram Bot Token
    telegram_chat_id: "" # Telegram Chat ID

  # 飞书消息模板
  feishu_message_template: |
    {
      "msg_type": "interactive",
      "card": {
        "header": {
          "title": {
            "tag": "plain_text",
            "content": "{{description}} - {{timestamp}}"
          }
        },
        "elements": [
          {
            "tag": "div",
            "text": {
              "tag": "lark_md",
              "content": "**标题数量**: {{total_titles}}\n**内容**: {{text}}"
            }
          }
        ]
      }
    }

# 用于让关注度更高的新闻在更前面显示
weight:
  rank_weight: 0.6 # 排名权重
  frequency_weight: 0.3 # 频次权重
  hotness_weight: 0.1 # 热度权重

# 监控的平台
platforms:
  - id: "toutiao"
    name: "今日头条"
  - id: "baidu"
    name: "百度热搜"
  - id: "wallstreetcn-hot"
    name: "华尔街见闻"
  - id: "thepaper"
    name: "澎湃新闻"
  - id: "bilibili-hot-search"
    name: "bilibili 热搜"
  - id: "cls-hot"
    name: "财联社热门"
  - id: "ifeng"
    name: "凤凰网"
  - id: "tieba"
    name: "贴吧"
  - id: "weibo"
    name: "微博"
  - id: "douyin"
    name: "抖音"
  - id: "zhihu"
    name: "知乎"

# 关键词筛选（可选）
keywords:
  - "科技"
  - "AI"
  - "财经"

# 定时任务配置
tasks:
  - name: investor_incremental
    schedule: "0 2 * * *" # 每日10:00 (UTC, 2:00 + 8h = 10:00 CST)
    mode: incremental # 增量模式，仅推送新增资讯
    rank_threshold: 5 # 排名高亮阈值
    description: "📈 投资者/交易员 - 新增资讯"

  - name: creator_current_morning
    schedule: "0 0 * * *" # 每日08:00 (UTC, 0:00 + 8h = 08:00 CST)
    mode: current # 实时热点模式
    rank_threshold: 5
    description: "📰 自媒体人/内容创作者 - 实时热点"

  - name: creator_current_afternoon
    schedule: "0 6 * * *" # 每日14:00 (UTC, 6:00 + 8h = 14:00 CST)
    mode: current # 实时热点模式
    rank_threshold: 5
    description: "📰 自媒体人/内容创作者 - 实时热点"

  - name: manager_daily
    schedule: "0 1 * * *" # 每日09:00 (UTC, 1:00 + 8h = 09:00 CST)
    mode: daily # 完整日报模式
    rank_threshold: 5
    description: "📋 企业管理者/普通用户 - 每日汇总"
